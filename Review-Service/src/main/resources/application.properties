spring.application.name=review-service
server.port=8007

# C?u h́nh Database
spring.datasource.url=jdbc:mysql://localhost:3306/review_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# C?u h́nh Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Database Configuration - THÊM allowPublicKeyRetrieval=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.mss301.hotelservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG