# src/main/resources/application.properties
spring.application.name=hotel-service
server.port=8084

# Database Configuration - THòM allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - S?A dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.mss301.hotelservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG