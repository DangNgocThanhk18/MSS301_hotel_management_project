# src/main/resources/application.properties
spring.application.name=booking-service
server.port=8004

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/booking_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== ??NH NGH?A URL GATEWAY =====
gateway.url=http://localhost:8000

# Cßc service d¨ng chung gateway URL
room.service.url=${gateway.url}
user.service.url=${gateway.url}
task.service.url=${gateway.url}
hotel.service.url=${gateway.url}
# N?u mu?n g?i tr?c ti?p (kh¶ng qua gateway), comment cßc d‗ng trÛn vÓ d¨ng:
# room.service.url=http://localhost:8083
# user.service.url=http://localhost:8082
# task.service.url=http://localhost:8084

# Feign Client Configuration
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

# Logging
logging.level.com.mss301.bookingservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG